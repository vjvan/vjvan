<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="988 廚房 B2B 補貨系統 — Wholesale Reorder System">
  <defs>
    <style>
      .paper { fill: #FAFAF7; }
